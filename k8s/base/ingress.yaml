apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: krishimitra-ingress
  namespace: krishimitra
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://krishimitra.ai,https://app.krishimitra.ai"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
spec:
  tls:
  - hosts:
    - api.krishimitra.ai
    - ml.krishimitra.ai
    secretName: krishimitra-tls
  rules:
  - host: api.krishimitra.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: krishimitra-api
            port:
              number: 80
      - path: /voice
        pathType: Prefix
        backend:
          service:
            name: krishimitra-voice
            port:
              number: 80
  - host: ml.krishimitra.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: krishimitra-ml
            port:
              number: 8080
---
# API Gateway with rate limiting
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: krishimitra-api-gateway
  namespace: krishimitra
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # Add security headers
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  tls:
  - hosts:
    - krishimitra.ai
    secretName: krishimitra-tls
  rules:
  - host: krishimitra.ai
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: krishimitra-api
            port:
              number: 80
