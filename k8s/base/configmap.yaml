apiVersion: v1
kind: ConfigMap
metadata:
  name: krishimitra-config
  namespace: krishimitra
data:
  # Application Settings
  APP_NAME: "KrishiMitra AI"
  VERSION: "1.0.0"
  ENV: "production"
  DEBUG: "false"

  # Server Settings
  HOST: "0.0.0.0"
  PORT: "8000"
  WORKERS: "4"

  # AIKosh API
  AIKOSH_BASE_URL: "https://aikosha.indiaai.gov.in/api/v1"

  # External APIs
  IMD_API_BASE: "https://mausam.imd.gov.in/api"
  AGMARKNET_API_BASE: "https://api.data.gov.in/resource/9ef84268-d588-465a-a308-a864a43d0070"

  # Feature Flags
  ENABLE_VOICE_AI: "true"
  ENABLE_PREDICTIONS: "true"
  ENABLE_GEOSPATIAL: "true"
  ENABLE_OFFLINE_SYNC: "true"
  ENABLE_MODEL_MONITORING: "true"

  # Model Settings
  MODEL_CACHE_DIR: "/app/models/cache"
  DEFAULT_MODEL_DEVICE: "cpu"
  BATCH_SIZE: "32"
  MAX_SEQUENCE_LENGTH: "512"

  # Voice Settings
  VOICE_MAX_DURATION: "60"
  DEFAULT_LANGUAGE: "hi"
  SUPPORTED_LANGUAGES: "hi,bn,te,ta,mr,gu,kn,ml,pa,ur,or,as,ne,si,en"

  # Database Pool
  DATABASE_POOL_SIZE: "10"
  DATABASE_MAX_OVERFLOW: "20"

  # Monitoring
  PROMETHEUS_MULTIPROC_DIR: "/tmp/prometheus"
  LOG_LEVEL: "INFO"
