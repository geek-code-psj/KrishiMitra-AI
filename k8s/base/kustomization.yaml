apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: krishimitra

resources:
- namespace.yaml
- configmap.yaml
- secrets.yaml
- rbac.yaml
- pvc.yaml
- deployment.yaml
- service.yaml
- ingress.yaml
- hpa.yaml
- pdb.yaml
- network-policy.yaml

commonLabels:
  app.kubernetes.io/name: krishimitra
  app.kubernetes.io/managed-by: kustomize

images:
- name: krishimitra/api
  newTag: v1.0.0
- name: krishimitra/ml
  newTag: v1.0.0
- name: krishimitra/voice
  newTag: v1.0.0

configMapGenerator:
- name: krishimitra-config
  behavior: merge
  literals:
  - ENV=production

replicas:
- name: krishimitra-api
  count: 3
- name: krishimitra-ml
  count: 2
- name: krishimitra-voice
  count: 2
