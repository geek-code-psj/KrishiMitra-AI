apiVersion: v1
kind: Namespace
metadata:
  name: krishimitra
  labels:
    app: krishimitra
    version: v1
    tier: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: krishimitra
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 80Gi
    limits.cpu: "40"
    limits.memory: 120Gi
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: krishimitra
spec:
  limits:
  - default:
      cpu: "1"
      memory: 2Gi
    defaultRequest:
      cpu: "500m"
      memory: 1Gi
    type: Container
