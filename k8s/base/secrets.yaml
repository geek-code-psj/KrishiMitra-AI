apiVersion: v1
kind: Secret
metadata:
  name: krishimitra-secrets
  namespace: krishimitra
type: Opaque
stringData:
  # Security - JWT
  SECRET_KEY: "change-this-in-production-to-32-char-key"

  # AIKosh API Key
  AIKOSH_API_KEY: ""

  # Sarvam AI API Key
  SARVAM_API_KEY: ""

  # Database URLs (format: postgresql+asyncpg://user:pass@host:port/db)
  DATABASE_URL: ""

  # Redis
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"

  # External API Keys
  IMD_API_KEY: ""
  AGMARKNET_API_KEY: ""

  # AWS/S3 (for model storage)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  # Monitoring
  SENTRY_DSN: ""
---
# SealedSecret for GitOps (optional - use sealed-secrets controller)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: krishimitra-secrets-sealed
  namespace: krishimitra
spec:
  encryptedData:
    # These are encrypted using kubeseal
    # Generate with: kubeseal --scope namespace-wide < secrets.yaml
    SECRET_KEY: ""
    DATABASE_URL: ""
